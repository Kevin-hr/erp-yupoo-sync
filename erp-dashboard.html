<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 同步监控看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Space Grotesk', monospace;
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
        }
        /* Brutalist Card */
        .card {
            border: 2px solid #1a1a1a;
            box-shadow: 4px 4px 0px #e0ff00;
            background: #111111;
        }
        .card-header {
            border-bottom: 2px solid #e0ff00;
            background: #1a1a1a;
        }
        /* KPI Large Number */
        .kpi-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 3rem;
            font-weight: 700;
            color: #e0ff00;
            text-shadow: 2px 2px 0px #1a1a1a;
        }
        /* Status Badge */
        .status-success {
            background: #00ff00;
            color: #000;
            font-weight: 700;
            padding: 2px 8px;
            font-size: 0.75rem;
        }
        .status-failed {
            background: #ff0000;
            color: #fff;
            font-weight: 700;
            padding: 2px 8px;
            font-size: 0.75rem;
        }
        /* Table */
        .table-row:nth-child(even) {
            background: #1a1a1a;
        }
        .table-row:hover {
            background: #222;
        }
        /* Timeline */
        .timeline-item {
            border-left: 3px solid #e0ff00;
            padding-left: 1rem;
            margin-bottom: 1rem;
        }
        .timeline-item.failed {
            border-left-color: #ff0000;
        }
        /* Progress bar */
        .progress-bar {
            background: #1a1a1a;
            height: 8px;
        }
        .progress-fill {
            background: #e0ff00;
            height: 100%;
        }
        /* Chart container */
        .chart-container {
            position: relative;
            height: 200px;
        }
        /* Footer */
        footer {
            border-top: 2px solid #1a1a1a;
        }
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #e0ff00;
        }
    </style>
</head>
<body class="min-h-screen p-6">
    <!-- Header -->
    <header class="mb-8">
        <h1 class="text-4xl font-bold text-[#e0ff00] tracking-tight">
            ERP 同步监控看板
        </h1>
        <p class="text-gray-500 mt-2">
            实时监控 Yupoo → MrShopPlus ERP 同步流水线状态
        </p>
        <p class="text-gray-600 text-sm mt-1" id="last-updated"></p>
    </header>

    <!-- KPI Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <!-- Total Syncs -->
        <div class="card p-4">
            <div class="card-header px-3 py-2 -mx-4 -mt-4 mb-4">
                <span class="text-xs font-bold tracking-widest text-[#e0ff00]">总同步次数</span>
            </div>
            <div class="kpi-value" id="kpi-total">7</div>
            <div class="text-gray-500 text-sm mt-2">全部批次</div>
        </div>
        <!-- Success -->
        <div class="card p-4">
            <div class="card-header px-3 py-2 -mx-4 -mt-4 mb-4">
                <span class="text-xs font-bold tracking-widest text-[#00ff00]">成功</span>
            </div>
            <div class="kpi-value text-[#00ff00]" id="kpi-success">2</div>
            <div class="text-gray-500 text-sm mt-2">同步成功</div>
        </div>
        <!-- Failed -->
        <div class="card p-4">
            <div class="card-header px-3 py-2 -mx-4 -mt-4 mb-4">
                <span class="text-xs font-bold tracking-widest text-[#ff0000]">失败</span>
            </div>
            <div class="kpi-value text-[#ff0000]" id="kpi-failed">5</div>
            <div class="text-gray-500 text-sm mt-2">同步失败</div>
        </div>
        <!-- Success Rate -->
        <div class="card p-4">
            <div class="card-header px-3 py-2 -mx-4 -mt-4 mb-4">
                <span class="text-xs font-bold tracking-widest text-[#e0ff00]">成功率</span>
            </div>
            <div class="kpi-value" id="kpi-rate">28.6%</div>
            <div class="progress-bar mt-4">
                <div class="progress-fill" id="progress-fill" style="width: 28.6%"></div>
            </div>
        </div>
    </div>

    <!-- Charts Row -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-8">
        <!-- Success/Fail Pie -->
        <div class="card p-4">
            <div class="card-header px-3 py-2 -mx-4 -mt-4 mb-4">
                <span class="text-xs font-bold tracking-widest text-[#e0ff00]">成功率分布</span>
            </div>
            <div class="chart-container">
                <canvas id="pieChart"></canvas>
            </div>
        </div>
        <!-- Duration Bar -->
        <div class="card p-4">
            <div class="card-header px-3 py-2 -mx-4 -mt-4 mb-4">
                <span class="text-xs font-bold tracking-widest text-[#e0ff00]">各批次耗时(秒)</span>
            </div>
            <div class="chart-container">
                <canvas id="barChart"></canvas>
            </div>
        </div>
        <!-- Brand Distribution -->
        <div class="card p-4">
            <div class="card-header px-3 py-2 -mx-4 -mt-4 mb-4">
                <span class="text-xs font-bold tracking-widest text-[#e0ff00]">Brand 分布</span>
            </div>
            <div class="chart-container">
                <canvas id="brandChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Timeline + Table -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-8">
        <!-- Timeline -->
        <div class="card p-4">
            <div class="card-header px-3 py-2 -mx-4 -mt-4 mb-4">
                <span class="text-xs font-bold tracking-widest text-[#e0ff00]">同步时间线</span>
            </div>
            <div class="max-h-96 overflow-y-auto pr-2" id="timeline">
                <!-- Timeline items will be injected by JS -->
            </div>
        </div>
        <!-- Details Table -->
        <div class="card p-4">
            <div class="card-header px-3 py-2 -mx-4 -mt-4 mb-4">
                <span class="text-xs font-bold tracking-widest text-[#e0ff00]">同步明细</span>
            </div>
            <div class="max-h-96 overflow-y-auto">
                <table class="w-full text-sm">
                    <thead class="sticky top-0 bg-[#111]">
                        <tr class="text-left text-[#e0ff00] border-b border-[#1a1a1a]">
                            <th class="py-2 px-2">时间</th>
                            <th class="py-2 px-2">Album</th>
                            <th class="py-2 px-2">Brand</th>
                            <th class="py-2 px-2">状态</th>
                            <th class="py-2 px-2">耗时</th>
                        </tr>
                    </thead>
                    <tbody id="sync-table">
                        <!-- Table rows will be injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Error Analysis -->
    <div class="card p-4 mb-8">
        <div class="card-header px-3 py-2 -mx-4 -mt-4 mb-4">
            <span class="text-xs font-bold tracking-widest text-[#e0ff00]">失败原因分析</span>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="error-analysis">
            <!-- Error items will be injected by JS -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center text-gray-600 text-sm py-4">
        <p>数据来源: <span class="mono text-[#e0ff00]">C:\Users\Administrator\Documents\GitHub\ERP\logs\</span></p>
        <p class="mt-1">最后更新: <span id="footer-time" class="mono"></span></p>
    </footer>

    <script>
    // ============ REAL SYNC DATA FROM logs/batch_v2_result_*.json ============
    const syncRecords = [
        {
            "timestamp": "2026-04-08T07:10:23",
            "album_id": "111166345",
            "brand": "SmokeTest",
            "product": "Unlisted Rule Verification - V2",
            "status": "failed",
            "duration": 11.2,
            "error": "在相册中未找到图片"
        },
        {
            "timestamp": "2026-04-08T07:11:45",
            "album_id": "111166345",
            "brand": "SmokeTest",
            "product": "Unlisted Rule Verification - V2",
            "status": "failed",
            "duration": 14.2,
            "error": "XHR 拦截失败"
        },
        {
            "timestamp": "2026-04-08T07:55:02",
            "album_id": "228499218",
            "brand": "SmokeTest",
            "product": "Unlisted Rule Verification - V2",
            "status": "failed",
            "duration": 142.0,
            "error": "dispatch_event timeout"
        },
        {
            "timestamp": "2026-04-08T09:11:33",
            "album_id": "228499218",
            "brand": "SmokeTest",
            "product": "Unlisted Rule Verification - V2",
            "status": "failed",
            "duration": 13.8,
            "error": "Yupoo 提取为空"
        },
        {
            "timestamp": "2026-04-08T09:17:18",
            "album_id": "231967755",
            "brand": "StoneIsland",
            "product": "Industrial Test Polo - V2",
            "status": "success",
            "duration": 54.1,
            "error": null
        },
        {
            "timestamp": "2026-04-08T13:47:55",
            "album_id": "231967755",
            "brand": "StoneIsland",
            "product": "Industrial Test Polo - V2",
            "status": "success",
            "duration": 51.6,
            "error": null
        },
        {
            "timestamp": "2026-04-08T13:49:22",
            "album_id": "231967755",
            "brand": "StoneIsland",
            "product": "Industrial Test Polo - V2",
            "status": "failed",
            "duration": 63.6,
            "error": "服务器未返回 action=3"
        }
    ];

    // Old batch_final data (3/3 failed)
    const oldRecords = [
        {
            "timestamp": "2026-04-07T10:00:00",
            "album_id": "N/A",
            "brand": "BAPE",
            "product": "Shark Hoodie",
            "status": "failed",
            "duration": 0,
            "error": "async_playwright is not defined"
        },
        {
            "timestamp": "2026-04-07T10:05:00",
            "album_id": "N/A",
            "brand": "Nike",
            "product": "Air Force 1",
            "status": "failed",
            "duration": 0,
            "error": "Failed to extract image URLs"
        },
        {
            "timestamp": "2026-04-07T10:10:00",
            "album_id": "N/A",
            "brand": "Adidas",
            "product": "Yeezy Boost 350 V2",
            "status": "failed",
            "duration": 0,
            "error": "Failed to extract image URLs"
        }
    ];

    // Merge all records
    const allRecords = [...oldRecords, ...syncRecords].sort((a, b) => 
        new Date(b.timestamp) - new Date(a.timestamp)
    );

    // ============ KPI UPDATE ============
    const total = allRecords.length;
    const success = allRecords.filter(r => r.status === 'success').length;
    const failed = allRecords.filter(r => r.status === 'failed').length;
    const rate = ((success / total) * 100).toFixed(1);

    document.getElementById('kpi-total').textContent = total;
    document.getElementById('kpi-success').textContent = success;
    document.getElementById('kpi-failed').textContent = failed;
    document.getElementById('kpi-rate').textContent = rate + '%';
    document.getElementById('progress-fill').style.width = rate + '%';

    // ============ PIE CHART ============
    new Chart(document.getElementById('pieChart'), {
        type: 'pie',
        data: {
            labels: ['成功', '失败'],
            datasets: [{
                data: [success, failed],
                backgroundColor: ['#00ff00', '#ff0000'],
                borderColor: '#0a0a0a',
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { color: '#e0e0e0', font: { family: 'Space Grotesk' } }
                }
            }
        }
    });

    // ============ BAR CHART (Duration) ============
    const barCtx = document.getElementById('barChart').getContext('2d');
    const barLabels = allRecords.map(r => r.brand.substring(0, 8) + '...');
    const barData = allRecords.map(r => r.duration || 0);
    const barColors = allRecords.map(r => r.status === 'success' ? '#00ff00' : '#ff0000');

    new Chart(barCtx, {
        type: 'bar',
        data: {
            labels: barLabels,
            datasets: [{
                label: '耗时(秒)',
                data: barData,
                backgroundColor: barColors,
                borderColor: '#1a1a1a',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { ticks: { color: '#888' }, grid: { color: '#1a1a1a' } },
                y: { ticks: { color: '#888' }, grid: { color: '#1a1a1a' } }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });

    // ============ BRAND CHART ============
    const brandCounts = {};
    allRecords.forEach(r => {
        brandCounts[r.brand] = (brandCounts[r.brand] || 0) + 1;
    });

    new Chart(document.getElementById('brandChart'), {
        type: 'doughnut',
        data: {
            labels: Object.keys(brandCounts),
            datasets: [{
                data: Object.values(brandCounts),
                backgroundColor: ['#e0ff00', '#00ff00', '#ff0000', '#0088ff', '#ff00ff'],
                borderColor: '#0a0a0a',
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { color: '#e0e0e0', font: { family: 'Space Grotesk' } }
                }
            }
        }
    });

    // ============ TIMELINE ============
    const timelineEl = document.getElementById('timeline');
    allRecords.forEach(r => {
        const date = new Date(r.timestamp).toLocaleString('zh-CN', { hour12: false });
        const item = document.createElement('div');
        item.className = `timeline-item ${r.status === 'failed' ? 'failed' : ''}`;
        item.innerHTML = `
            <div class="text-xs text-gray-500 mono">${date}</div>
            <div class="font-bold mt-1">${r.brand} - ${r.product}</div>
            <div class="text-sm mt-1">
                <span class="${r.status === 'success' ? 'status-success' : 'status-failed'}">
                    ${r.status === 'success' ? 'SUCCESS' : 'FAILED'}
                </span>
                <span class="text-gray-400 ml-2">${r.duration}s</span>
            </div>
            ${r.error ? `<div class="text-xs text-red-400 mt-1">⚠ ${r.error}</div>` : ''}
        `;
        timelineEl.appendChild(item);
    });

    // ============ TABLE ============
    const tableEl = document.getElementById('sync-table');
    allRecords.forEach(r => {
        const date = new Date(r.timestamp).toLocaleString('zh-CN', { hour12: false }).split(' ')[1];
        const row = document.createElement('tr');
        row.className = 'table-row border-b border-[#1a1a1a]';
        row.innerHTML = `
            <td class="py-2 px-2 mono text-xs">${date}</td>
            <td class="py-2 px-2 mono text-xs">${r.album_id}</td>
            <td class="py-2 px-2">${r.brand}</td>
            <td class="py-2 px-2">
                <span class="${r.status === 'success' ? 'status-success' : 'status-failed'}">
                    ${r.status === 'success' ? '✅' : '❌'}
                </span>
            </td>
            <td class="py-2 px-2 mono">${r.duration || '-'}s</td>
        `;
        tableEl.appendChild(row);
    });

    // ============ ERROR ANALYSIS ============
    const errorCounts = {};
    allRecords.filter(r => r.error).forEach(r => {
        errorCounts[r.error] = (errorCounts[r.error] || 0) + 1;
    });

    const errorEl = document.getElementById('error-analysis');
    Object.entries(errorCounts).forEach(([error, count]) => {
        const div = document.createElement('div');
        div.className = 'bg-[#1a1a1a] p-3 border-l-4 border-red-500';
        div.innerHTML = `
            <div class="text-red-500 font-bold text-lg">${count}x</div>
            <div class="text-sm text-gray-300 mt-1">${error}</div>
        `;
        errorEl.appendChild(div);
    });

    // ============ FOOTER TIME ============
    document.getElementById('footer-time').textContent = new Date().toLocaleString('zh-CN', { hour12: false });
    document.getElementById('last-updated').textContent = `看板加载于 ${new Date().toLocaleString('zh-CN', { hour12: false })}`;
    </script>
</body>
</html>
