<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {

}
.header {

  border-bottom: 2px solid #00d4ff;

  justify-content: space-between;

}

}
.header .version {

  padding: 5px 15px;
  border-radius: 20px;
  font-weight: bold;
  font-size: 14px;
}
.svg-container {
  padding: 20px;
  min-width: 1800px;
}
.node { cursor: pointer; }
.node:hover .node-bg { filter: brightness(1.2); }
.node-info {
  font-size: 11px;
  fill: #a0a0a0;
  font-family: 'Consolas', monospace;
}
/* Animation */
@keyframes flowPulse {
  0% { stroke-dashoffset: 20; opacity: 0.3; }
  50% { opacity: 1; }
  100% { stroke-dashoffset: 0; opacity: 0.3; }
}
.flow-line {
  animation: flowPulse 2s ease-in-out infinite;
}
.legend {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(26,31,78,0.95);
  border: 1px solid #00d4ff;
  border-radius: 10px;
  padding: 15px 20px;
  font-size: 12px;
}
.legend-item {
  display: flex;
  align-items: center;
  margin: 5px 0;
}
.legend-color {
  width: 20px;
  height: 20px;
  margin-right: 10px;
  border-radius: 4px;
}
.legend-line {
  width: 30px;
  height: 3px;
  margin-right: 10px;
  border-radius: 2px;
}
.tooltip {
  position: fixed;
  background: rgba(0,0,0,0.95);
  border: 1px solid #00d4ff;
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 12px;
  max-width: 300px;
  display: none;
  z-index: 1000;
  box-shadow: 0 4px 20px rgba(0,212,255,0.3);
}
.tooltip h4 {
  color: #00d4ff;
  margin-bottom: 8px;
  font-size: 13px;
}
.tooltip table {
  width: 100%;
  border-collapse: collapse;
}
.tooltip td {
  padding: 3px 8px;
  border-bottom: 1px solid #333;
}
.tooltip td:first-child {
  color: #888;
  width: 60px;
}
</style>
